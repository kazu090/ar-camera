<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>フィジタルARデモ</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- MindAR for A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- CSS：キャッシュ対策で v を付ける -->
  <link rel="stylesheet" href="./style.css?v=5" />
</head>

<body>
  <!-- 操作用UI -->
  <div id="overlay">
    <div id="status">AR開始を押してください</div>
    <button id="startAR" type="button">AR開始</button>
    <button id="switchCamera" type="button">カメラ切替</button>
    <button id="capture" type="button">写真撮影</button>
  </div>

  <!-- MindARシーン -->
  <a-scene
    id="arScene"
    mindar-image="imageTargetSrc: ./assets/marker.mind; maxTrack: 1; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.01;"
    color-space="sRGB"
    renderer="alpha: true; antialias: true; colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    xr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
    embedded
  >
    <a-assets timeout="20000">
      <img id="character" src="./assets/character.png" crossorigin="anonymous" />
    </a-assets>

    <!-- カメラ -->
    <a-camera
      id="camera"
      position="0 0 0"
      look-controls="enabled: false"
      cursor="fuse: false; rayOrigin: mouse;"
    ></a-camera>

    <!-- MindARのターゲット。a-markerではなくa-entityを使う -->
    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <!-- 右後ろに出したいので、X方向を少し右へ -->
      <a-image
        id="characterImage"
        src="#character"
        position="0.35 0 0.08"
        rotation="0 0 0"
        scale="0.8 0.8 0.8"
        transparent="true"
      ></a-image>
    </a-entity>
  </a-scene>

  <!-- JS：キャッシュ対策で v を付ける -->
  <script src="./script.js?v=5"></script>
</body>
</html>
